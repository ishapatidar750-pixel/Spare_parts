<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLANT.CTRL — Spare Parts Demand Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg-deep:#F7F8FA;
    --bg-panel:#FFFFFF;
    --bg-panel-alt:#F1F3F7;
    --bg-raised:#EAEDF3;
    --line: rgba(18,21,28,0.09);
    --line-strong: rgba(18,21,28,0.18);
    --amber:#D97F1E;
    --amber-dim: rgba(217,127,30,0.12);
    --teal:#0E9E8C;
    --teal-dim: rgba(14,158,140,0.12);
    --red:#E0483C;
    --red-dim: rgba(224,72,60,0.12);
    --blue:#2F6FE0;
    --blue-dim: rgba(47,111,224,0.12);
    --text-primary:#12151C;
    --text-muted:#5B6577;
    --text-faint:#8791A3;
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }

  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }
  body{
    margin:0;
    background:
      radial-gradient(ellipse 1200px 600px at 15% -10%, rgba(217,127,30,0.05), transparent 60%),
      radial-gradient(ellipse 900px 500px at 100% 0%, rgba(47,111,224,0.04), transparent 60%),
      var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  ::selection{ background: var(--amber-dim); color: var(--amber); }

  /* ---------- Ticker ---------- */
  .ticker-wrap{
    background: #12151C;
    border-bottom: 1px solid var(--line);
    overflow: hidden;
    white-space: nowrap;
    padding: 7px 0;
    position: relative;
  }
  .ticker-wrap::before, .ticker-wrap::after{
    content:"";
    position:absolute; top:0; bottom:0; width:60px; z-index:2;
  }
  .ticker-wrap::before{ left:0; background: linear-gradient(90deg, #12151C, transparent); }
  .ticker-wrap::after{ right:0; background: linear-gradient(270deg, #12151C, transparent); }
  .ticker-track{
    display:inline-flex;
    align-items:center;
    animation: scroll-left 38s linear infinite;
  }
  .ticker-track span{
    font-family: var(--font-mono);
    font-size: 11.5px;
    letter-spacing: 0.04em;
    color: var(--amber);
    padding: 0 28px;
    display:inline-flex;
    align-items:center;
    gap:8px;
  }
  .ticker-track span::before{
    content:"";
    width:5px; height:5px; border-radius:50%;
    background: var(--teal);
    box-shadow: 0 0 6px var(--teal);
    display:inline-block;
  }
  @keyframes scroll-left{
    0%{ transform: translateX(0); }
    100%{ transform: translateX(-50%); }
  }

  /* ---------- Header ---------- */
  header{
    padding: 28px 40px 20px;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
    gap: 20px;
  }
  .brand{ display:flex; align-items:center; gap:14px; }
  .brand-mark{
    width:42px; height:42px;
    border:1.5px solid var(--amber);
    border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-family: var(--font-mono);
    font-weight:700;
    color: var(--amber);
    font-size: 15px;
    position:relative;
    flex-shrink:0;
  }
  .brand-mark::after{
    content:"";
    position:absolute; inset:-5px;
    border:1px solid rgba(255,162,58,0.25);
    border-radius:11px;
  }
  .brand-text h1{
    font-family: var(--font-display);
    font-size: 20px;
    font-weight:600;
    margin:0;
    letter-spacing: 0.01em;
  }
  .brand-text p{
    margin: 3px 0 0;
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    letter-spacing: 0.03em;
  }
  .header-meta{
    display:flex;
    gap: 28px;
    align-items:center;
  }
  .meta-item{ text-align:right; }
  .meta-item .label{
    font-size: 10px;
    text-transform:uppercase;
    letter-spacing: 0.09em;
    color: var(--text-faint);
    font-family: var(--font-mono);
  }
  .meta-item .value{
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--teal);
    font-weight: 500;
    margin-top: 2px;
  }
  .status-dot{
    display:inline-block; width:7px; height:7px; border-radius:50%;
    background: var(--teal); box-shadow: 0 0 8px var(--teal);
    animation: pulse 2s ease-in-out infinite;
    margin-right:6px;
  }
  @keyframes pulse{
    0%,100%{ opacity:1; }
    50%{ opacity:0.4; }
  }

  /* ---------- Nav ---------- */
  nav{
    display:flex;
    gap: 6px;
    padding: 16px 40px 0;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
  }
  .tab-btn{
    font-family: var(--font-display);
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text-muted);
    background: transparent;
    border: none;
    padding: 12px 18px;
    cursor:pointer;
    position:relative;
    letter-spacing: 0.02em;
    display:flex; align-items:center; gap:8px;
    transition: color 0.15s ease;
  }
  .tab-btn .idx{
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-faint);
    border:1px solid var(--line-strong);
    border-radius:4px;
    padding:1px 5px;
  }
  .tab-btn:hover{ color: var(--text-primary); }
  .tab-btn.active{ color: var(--amber); }
  .tab-btn.active .idx{ color:var(--amber); border-color: rgba(255,162,58,0.4); }
  .tab-btn::after{
    content:"";
    position:absolute; left:18px; right:18px; bottom:-1px; height:2px;
    background: transparent;
  }
  .tab-btn.active::after{ background: var(--amber); box-shadow: 0 0 8px rgba(255,162,58,0.5); }

  main{ padding: 32px 40px 60px; max-width: 1400px; margin:0 auto; }
  .view{ display:none; animation: fade-in 0.35s ease; }
  .view.active{ display:block; }
  @keyframes fade-in{ from{ opacity:0; transform: translateY(6px);} to{ opacity:1; transform:translateY(0);} }

  .view-head{
    display:flex; justify-content:space-between; align-items:flex-end;
    margin-bottom: 22px; flex-wrap:wrap; gap:14px;
  }
  .view-head h2{
    font-family: var(--font-display);
    font-size: 24px;
    margin:0 0 4px;
    font-weight:600;
  }
  .view-head p{
    margin:0; color: var(--text-muted); font-size:13px; max-width:560px;
  }
  .plant-filter{ display:flex; gap:6px; flex-wrap:wrap; }
  .plant-btn{
    font-family: var(--font-mono);
    font-size:12px;
    background: var(--bg-panel);
    border:1px solid var(--line-strong);
    color: var(--text-muted);
    padding:7px 13px;
    border-radius:6px;
    cursor:pointer;
    transition: all 0.15s ease;
  }
  .plant-btn:hover{ border-color: var(--amber); color: var(--text-primary); }
  .plant-btn.active{
    background: var(--amber-dim);
    border-color: var(--amber);
    color: var(--amber);
  }

  /* ---------- Grid & cards ---------- */
  .grid{ display:grid; gap:16px; }
  .g-kpis{ grid-template-columns: repeat(4, 1fr); margin-bottom: 16px; }
  .g-2{ grid-template-columns: 1.3fr 1fr; }
  .g-3{ grid-template-columns: repeat(3, 1fr); }
  .g-1-2{ grid-template-columns: 1fr 1.6fr; }

  .card{
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px 20px;
    position: relative;
  }
  .card-tag{
    position:absolute; top:14px; right:16px;
    font-family: var(--font-mono);
    font-size: 9.5px;
    color: var(--text-faint);
    letter-spacing: 0.06em;
  }
  .card h3{
    font-family: var(--font-display);
    font-size: 13.5px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin: 0 0 4px;
    font-weight: 600;
  }
  .card .sub{ font-size:11.5px; color: var(--text-faint); margin-bottom:14px; }

  .kpi-card{ padding-bottom: 16px; }
  .kpi-value{
    font-family: var(--font-mono);
    font-size: 30px;
    font-weight: 700;
    color: var(--text-primary);
    line-height:1;
    margin-top: 6px;
  }
  .kpi-value.amber{ color: var(--amber); }
  .kpi-value.teal{ color: var(--teal); }
  .kpi-value.red{ color: var(--red); }
  .kpi-delta{
    font-family: var(--font-mono);
    font-size: 11px;
    margin-top: 8px;
    color: var(--text-muted);
  }

  canvas{ max-width: 100%; }

  /* rack bar (signature element) */
  .rack{
    display:flex; flex-direction:column; gap:10px; margin-top: 6px;
  }
  .rack-row{ display:flex; align-items:center; gap:12px; }
  .rack-label{
    font-family: var(--font-mono); font-size:11.5px; width: 96px; flex-shrink:0; color: var(--text-muted);
  }
  .rack-track{
    flex:1; height: 20px; background: var(--bg-panel-alt);
    border-radius:4px; overflow:hidden; border:1px solid var(--line);
    position:relative;
  }
  .rack-fill{
    height:100%; border-radius: 3px 0 0 3px;
    display:flex; align-items:center;
    transition: width 1.1s cubic-bezier(.2,.8,.2,1);
  }
  .rack-fill span{
    font-family: var(--font-mono); font-size:10.5px; color:#05070B; font-weight:700;
    margin-left:8px; white-space:nowrap;
  }
  .rack-count{ font-family: var(--font-mono); font-size:11.5px; color:var(--text-faint); width:64px; text-align:right; flex-shrink:0; }

  table{ width:100%; border-collapse: collapse; font-size:12.5px; }
  thead th{
    text-align:left;
    font-family: var(--font-mono);
    font-size: 10.5px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color: var(--text-faint);
    padding: 8px 10px;
    border-bottom: 1px solid var(--line-strong);
    cursor: pointer;
    user-select:none;
    white-space:nowrap;
  }
  thead th:hover{ color: var(--amber); }
  thead th.sorted{ color: var(--amber); }
  tbody td{
    padding: 9px 10px;
    border-bottom: 1px solid var(--line);
    color: var(--text-primary);
    font-family: var(--font-mono);
    white-space:nowrap;
  }
  tbody td.desc{
    font-family: var(--font-body);
    white-space:normal;
    color: var(--text-muted);
    max-width: 240px;
  }
  tbody tr:hover{ background: var(--bg-raised); }
  .badge{
    display:inline-block; padding:2px 8px; border-radius:20px;
    font-size:10.5px; font-family:var(--font-mono); font-weight:600;
  }
  .badge.Lumpy{ background: var(--red-dim); color: var(--red); }
  .badge.Erratic{ background: var(--blue-dim); color: var(--blue); }
  .badge.Smooth{ background: var(--teal-dim); color: var(--teal); }
  .badge.Intermittent{ background: var(--amber-dim); color: var(--amber); }
  .badge.Naive{ background: rgba(140,150,170,0.15); color: var(--text-muted); }
  .badge.Moving_Average{ background: var(--amber-dim); color: var(--amber); }

  .search-row{ display:flex; gap:10px; margin-bottom:14px; }
  .search-row input{
    background: var(--bg-panel-alt);
    border: 1px solid var(--line-strong);
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 12.5px;
    padding: 10px 14px;
    border-radius: 6px;
    flex:1;
    outline:none;
  }
  .search-row input:focus{ border-color: var(--amber); }
  .search-row input::placeholder{ color: var(--text-faint); }
  .table-scroll{ max-height: 420px; overflow-y:auto; }
  .table-scroll::-webkit-scrollbar{ width:8px; }
  .table-scroll::-webkit-scrollbar-thumb{ background: var(--line-strong); border-radius:4px; }

  .insight{
    display:flex; gap:10px; align-items:flex-start;
    background: var(--amber-dim);
    border: 1px solid rgba(255,162,58,0.3);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 12.5px;
    color: #FFC98A;
    margin-top: 10px;
    line-height:1.5;
  }
  .insight b{ color: var(--amber); }
  .insight-icon{ font-family: var(--font-mono); color: var(--amber); font-weight:700; }

  footer{
    padding: 24px 40px 40px;
    text-align:center;
    color: var(--text-faint);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing:0.03em;
  }

  @media (max-width: 900px){
    .g-kpis, .g-2, .g-3, .g-1-2{ grid-template-columns: 1fr; }
    header, nav, main{ padding-left:20px; padding-right:20px; }
  }

  @media (prefers-reduced-motion: reduce){
    .ticker-track, .status-dot{ animation: none !important; }
  }
</style>
</head>

<script>
const DATA = JSON.parse(document.getElementById('dashboard-data').textContent);
const MONTHS = DATA.months;
const PLANTS = Object.keys(DATA.plants).sort();
const COLORS = {
  amber:'#D97F1E', teal:'#0E9E8C', red:'#E0483C', blue:'#2F6FE0',
  muted:'#5B6577', line:'rgba(18,21,28,0.09)'
};
Chart.defaults.font.family = "'JetBrains Mono', monospace";
Chart.defaults.color = COLORS.muted;
Chart.defaults.font.size = 11;

document.getElementById('plantCountMeta').textContent = PLANTS.length + ' UNITS';

function fmt(n){
  if(n === null || n === undefined || isNaN(n)) return '—';
  const abs = Math.abs(n);
  if(abs >= 1e6) return (n/1e6).toFixed(2)+'M';
  if(abs >= 1e3) return (n/1e3).toFixed(1)+'K';
  return Math.round(n).toLocaleString();
}
function pct(part, total){ return total ? ((part/total)*100).toFixed(1)+'%' : '0%'; }

/* ---------------- TICKER ---------------- */
(function buildTicker(){
  const ex = DATA.executive;
  const items = [
    `TOTAL PART-PLANT RECORDS: ${fmt(ex.total_records)}`,
    `UNIQUE PARTS: ${fmt(ex.unique_parts)}`,
    `FORECAST-ELIGIBLE: ${fmt(ex.eligible)} (${pct(ex.eligible, ex.total_records)})`,
    `TOTAL FORECAST VOLUME (6M): ${fmt(ex.total_forecast_units)} UNITS`,
    `PLANTS ONLINE: ${PLANTS.join(' · ')}`,
    `LUMPY DEMAND SHARE: ${pct(ex.class_counts['Lumpy']||0, ex.total_records)}`,
    `NEXT REFRESH: ON NEW SOURCE UPLOAD`
  ];
  const track = document.getElementById('tickerTrack');
  const html = items.map(t=>`<span>${t}</span>`).join('');
  track.innerHTML = html + html; // duplicate for seamless loop
})();

/* ================================================================
   VIEW 1 — EXECUTIVE
================================================================ */
function renderExecutive(){
  const ex = DATA.executive;
  const el = document.getElementById('view-executive');
  el.innerHTML = `
    <div class="view-head">
      <div>
        <h2>Executive Overview</h2>
        <p>Portfolio-wide demand health and forecast output across all ${PLANTS.length} plants, derived from the demand profiling and forecasting engine.</p>
      </div>
    </div>

    <div class="grid g-kpis">
      <div class="card kpi-card">
        <h3>Unique Parts</h3>
        <div class="kpi-value">${fmt(ex.unique_parts)}</div>
        <div class="kpi-delta">across ${PLANTS.length} plants · ${fmt(ex.total_records)} part-plant records</div>
      </div>
      <div class="card kpi-card">
        <h3>Forecast Eligible</h3>
        <div class="kpi-value teal">${pct(ex.eligible, ex.total_records)}</div>
        <div class="kpi-delta">${fmt(ex.eligible)} eligible · ${fmt(ex.not_eligible)} excluded (thin history / low volume)</div>
      </div>
      <div class="card kpi-card">
        <h3>6-Month Forecast Volume</h3>
        <div class="kpi-value amber">${fmt(ex.total_forecast_units)}</div>
        <div class="kpi-delta">units, May–Oct 2026 combined</div>
      </div>
      <div class="card kpi-card">
        <h3>Lumpy Demand Share</h3>
        <div class="kpi-value red">${pct(ex.class_counts['Lumpy']||0, ex.total_records)}</div>
        <div class="kpi-delta">highest-risk demand pattern class</div>
      </div>
    </div>

    <div class="grid g-2" style="margin-bottom:16px;">
      <div class="card">
        <span class="card-tag">FIG.01</span>
        <h3>Demand Classification Mix</h3>
        <div class="sub">Smooth · Erratic · Intermittent · Lumpy (ADI / CV² method)</div>
        <div class="rack" id="rackClass"></div>
        <div class="insight"><span class="insight-icon">!</span> <span><b>${pct(ex.class_counts['Lumpy']||0, ex.total_records)}</b> of the portfolio is classified <b>Lumpy</b> — sporadic, high-variance demand that plain averaging forecasts (current method) will systematically under- or over-shoot. These parts need intermittent-demand methods (Croston/SBA), not mean-based forecasts.</span></div>
      </div>
      <div class="card">
        <span class="card-tag">FIG.02</span>
        <h3>Parts by Plant</h3>
        <div class="sub">Part-plant record count</div>
        <canvas id="chartPlantBar" height="200"></canvas>
      </div>
    </div>

    <div class="grid g-1-2">
      <div class="card">
        <span class="card-tag">FIG.03</span>
        <h3>Top 10 Parts by Forecast</h3>
        <div class="sub">Total forecasted units, May–Oct 2026</div>
        <canvas id="chartTop10" height="260"></canvas>
      </div>
      <div class="card">
        <span class="card-tag">FIG.04</span>
        <h3>6-Month Forecast Trend</h3>
        <div class="sub">Aggregate forecast volume by month, all plants</div>
        <canvas id="chartMonthly" height="260"></canvas>
        <div class="insight"><span class="insight-icon">i</span> <span>The line is flat because the current model repeats a single mean/median value across the whole horizon — it has no month-to-month shape. Worth flagging if the business expects seasonality.</span></div>
      </div>
    </div>
  `;

  // Rack bars for demand class
  const rack = document.getElementById('rackClass');
  const classColor = {Smooth:'var(--teal)', Erratic:'var(--blue)', Intermittent:'var(--amber)', Lumpy:'var(--red)', 'No Demand':'var(--text-faint)'};
  const order = ['Lumpy','No Demand','Erratic','Smooth','Intermittent'];
  const classesPresent = order.filter(c=>ex.class_counts[c] !== undefined);
  const maxVal = Math.max(...classesPresent.map(c=>ex.class_counts[c]));
  rack.innerHTML = classesPresent.map(c=>{
    const v = ex.class_counts[c];
    const w = (v/maxVal*100).toFixed(1);
    return `<div class="rack-row">
      <div class="rack-label">${c}</div>
      <div class="rack-track"><div class="rack-fill" style="width:0%; background:${classColor[c]||'var(--text-muted)'}" data-w="${w}"><span>${pct(v, ex.total_records)}</span></div></div>
      <div class="rack-count">${fmt(v)}</div>
    </div>`;
  }).join('');
  requestAnimationFrame(()=>{
    rack.querySelectorAll('.rack-fill').forEach(f=>{ f.style.width = f.dataset.w+'%'; });
  });

  new Chart(document.getElementById('chartPlantBar'), {
    type:'bar',
    data:{
      labels: PLANTS,
      datasets:[{
        label:'Parts', data: PLANTS.map(p=>ex.plant_counts[p]),
        backgroundColor: COLORS.amber, borderRadius:4, maxBarThickness: 46
      }]
    },
    options: baseBarOpts('Plant Code')
  });

  const top10 = ex.top10;
  new Chart(document.getElementById('chartTop10'), {
    type:'bar',
    data:{
      labels: top10.map(t=>t['Part No']),
      datasets:[{
        label:'Total Forecast', data: top10.map(t=>t['Total_Forecast']),
        backgroundColor: COLORS.teal, borderRadius:4, maxBarThickness: 28
      }]
    },
    options:{
      indexAxis:'y',
      responsive:true,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{
        label: (ctx)=> `${fmt(ctx.parsed.x)} units — ${top10[ctx.dataIndex]['Material Description']}`
      }}},
      scales:{
        x:{ grid:{color:COLORS.line}, ticks:{callback:v=>fmt(v)} },
        y:{ grid:{display:false} }
      }
    }
  });

  new Chart(document.getElementById('chartMonthly'), {
    type:'line',
    data:{
      labels: MONTHS,
      datasets:[{
        label:'Forecast Volume', data: MONTHS.map(m=>ex.monthly_totals[m]),
        borderColor: COLORS.amber, backgroundColor: 'rgba(255,162,58,0.12)',
        fill:true, tension:0.35, pointBackgroundColor: COLORS.amber, pointRadius:4
      }]
    },
    options:{
      responsive:true,
      plugins:{ legend:{display:false} },
      scales:{
        x:{ grid:{display:false} },
        y:{ grid:{color:COLORS.line}, ticks:{callback:v=>fmt(v)} }
      }
    }
  });
}

function baseBarOpts(xLabel){
  return {
    responsive:true,
    plugins:{ legend:{display:false} },
    scales:{
      x:{ grid:{display:false}, title:{display:!!xLabel, text:xLabel, color:COLORS.muted} },
      y:{ grid:{color:COLORS.line}, ticks:{callback:v=>fmt(v)} }
    }
  };
}

/* ================================================================
   VIEW 2 — PLANNING
================================================================ */
let currentPlant = 'ALL';
let sortState = { key:'Total_Forecast', dir:-1 };

function renderPlanning(){
  const el = document.getElementById('view-planning');
  el.innerHTML = `
    <div class="view-head">
      <div>
        <h2>Planning Workbench</h2>
        <p>Plant-level demand composition and month-by-month forecast, with a searchable part explorer for planners.</p>
      </div>
      <div class="plant-filter" id="plantFilter"></div>
    </div>

    <div class="grid g-2" style="margin-bottom:16px;">
      <div class="card">
        <span class="card-tag">FIG.05</span>
        <h3 id="planTitle">Monthly Forecast — All Plants</h3>
        <div class="sub">Units per month, May–Oct 2026</div>
        <canvas id="chartPlanMonthly" height="220"></canvas>
      </div>
      <div class="card">
        <span class="card-tag">FIG.06</span>
        <h3>Demand Class Composition</h3>
        <div class="sub" id="planClassSub">Selected scope</div>
        <canvas id="chartPlanClass" height="220"></canvas>
      </div>
    </div>

    <div class="card">
      <span class="card-tag">FIG.07</span>
      <h3>Part Explorer</h3>
      <div class="sub">Top 400 parts by total forecast volume — search, sort, and filter by plant</div>
      <div class="search-row">
        <input type="text" id="partSearch" placeholder="Search part no. or description…">
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th data-key="Plant_Code">Plant</th>
              <th data-key="Part No">Part No</th>
              <th data-key="Material Description">Description</th>
              <th data-key="Demand_Class">Class</th>
              <th data-key="Best_Model">Model</th>
              ${MONTHS.map(m=>`<th data-key="${m}">${m.split('-')[0]}</th>`).join('')}
              <th data-key="Total_Forecast">Total</th>
            </tr>
          </thead>
          <tbody id="explorerBody"></tbody>
        </table>
      </div>
    </div>
  `;

  // plant filter buttons
  const pf = document.getElementById('plantFilter');
  pf.innerHTML = ['ALL', ...PLANTS].map(p=>
    `<button class="plant-btn ${p===currentPlant?'active':''}" data-plant="${p}">${p==='ALL'?'All Plants':'Plant '+p}</button>`
  ).join('');
  pf.querySelectorAll('.plant-btn').forEach(b=>{
    b.addEventListener('click', ()=>{
      currentPlant = b.dataset.plant;
      renderPlanning();
    });
  });

  // monthly chart for selected scope
  let monthlyData, className;
  if(currentPlant === 'ALL'){
    monthlyData = MONTHS.map(m=>DATA.executive.monthly_totals[m]);
    className = DATA.executive.class_counts;
    document.getElementById('planTitle').textContent = 'Monthly Forecast — All Plants';
    document.getElementById('planClassSub').textContent = 'All plants combined';
  } else {
    const p = DATA.plants[currentPlant];
    monthlyData = MONTHS.map(m=>p.monthly_forecast[m]);
    className = p.class_counts;
    document.getElementById('planTitle').textContent = 'Monthly Forecast — Plant ' + currentPlant;
    document.getElementById('planClassSub').textContent = 'Plant ' + currentPlant + ' — ' + fmt(p.total_parts) + ' unique parts';
  }

  new Chart(document.getElementById('chartPlanMonthly'), {
    type:'bar',
    data:{ labels: MONTHS, datasets:[{ data: monthlyData, backgroundColor: COLORS.amber, borderRadius:4, maxBarThickness:46 }]},
    options: baseBarOpts(null)
  });

  const classColorMap = {Smooth:COLORS.teal, Erratic:COLORS.blue, Intermittent:COLORS.amber, Lumpy:COLORS.red, 'No Demand':'#3a4257'};
  const classLabels = Object.keys(className);
  new Chart(document.getElementById('chartPlanClass'), {
    type:'doughnut',
    data:{
      labels: classLabels,
      datasets:[{ data: classLabels.map(c=>className[c]), backgroundColor: classLabels.map(c=>classColorMap[c]||COLORS.muted), borderColor: '#FFFFFF', borderWidth:2 }]
    },
    options:{
      responsive:true, cutout:'65%',
      plugins:{ legend:{ position:'bottom', labels:{ boxWidth:10, padding:14 } } }
    }
  });

  renderExplorerTable();
  document.getElementById('partSearch').addEventListener('input', renderExplorerTable);
  el.querySelectorAll('thead th').forEach(th=>{
    th.addEventListener('click', ()=>{
      const key = th.dataset.key;
      sortState.dir = (sortState.key === key) ? sortState.dir*-1 : -1;
      sortState.key = key;
      renderExplorerTable();
    });
  });
}

function renderExplorerTable(){
  const q = (document.getElementById('partSearch').value || '').toLowerCase();
  let rows = DATA.explorer.filter(r=>{
    if(currentPlant !== 'ALL' && String(r.Plant_Code) !== currentPlant) return false;
    if(!q) return true;
    return String(r['Part No']).toLowerCase().includes(q) || String(r['Material Description']).toLowerCase().includes(q);
  });
  rows.sort((a,b)=>{
    const k = sortState.key;
    let av = a[k], bv = b[k];
    if(typeof av === 'string'){ av = av.toLowerCase(); bv = bv.toLowerCase(); return av < bv ? -1*sortState.dir : av > bv ? 1*sortState.dir : 0; }
    return (av - bv) * sortState.dir;
  });

  document.querySelectorAll('#view-planning thead th').forEach(th=>{
    th.classList.toggle('sorted', th.dataset.key === sortState.key);
  });

  const body = document.getElementById('explorerBody');
  if(rows.length === 0){
    body.innerHTML = `<tr><td colspan="10" style="text-align:center; color:var(--text-faint); padding:24px; font-family:var(--font-body);">No parts match this search.</td></tr>`;
    return;
  }
  body.innerHTML = rows.slice(0,150).map(r=>`
    <tr>
      <td>${r.Plant_Code}</td>
      <td>${r['Part No']}</td>
      <td class="desc">${r['Material Description']}</td>
      <td><span class="badge ${r.Demand_Class.replace(' ','_')}">${r.Demand_Class}</span></td>
      <td><span class="badge ${r.Best_Model}">${r.Best_Model === 'Moving_Average' ? 'Mov. Avg' : 'Naive'}</span></td>
      ${MONTHS.map(m=>`<td>${fmt(r[m])}</td>`).join('')}
      <td style="color:var(--amber); font-weight:600;">${fmt(r.Total_Forecast)}</td>
    </tr>
  `).join('');
}

/* ================================================================
   VIEW 3 — FORECAST MODEL / ACCURACY
================================================================ */
function renderAccuracy(){
  const acc = DATA.accuracy;
  const el = document.getElementById('view-accuracy');
  const modelKeys = Object.keys(acc.best_model_counts);

  el.innerHTML = `
    <div class="view-head">
      <div>
        <h2>Forecast Model Diagnostics</h2>
        <p>Which forecasting method won for which parts, and where eligibility cuts off. Note: accuracy metrics (MAPE/RMSE) were computed upstream but not persisted in the exported files — this view reflects model selection outcomes only.</p>
      </div>
    </div>

    <div class="grid g-kpis" style="grid-template-columns: repeat(3,1fr); margin-bottom:16px;">
      <div class="card kpi-card">
        <h3>Total Records</h3>
        <div class="kpi-value">${fmt(acc.total_records)}</div>
        <div class="kpi-delta">part-plant combinations evaluated</div>
      </div>
      <div class="card kpi-card">
        <h3>Eligible for Forecasting</h3>
        <div class="kpi-value teal">${pct(acc.eligible, acc.total_records)}</div>
        <div class="kpi-delta">${fmt(acc.eligible)} passed history &amp; volume thresholds</div>
      </div>
      <div class="card kpi-card">
        <h3>Excluded</h3>
        <div class="kpi-value red">${pct(acc.not_eligible, acc.total_records)}</div>
        <div class="kpi-delta">${fmt(acc.not_eligible)} — no demand, &lt;6 active months, or &lt;5 units total</div>
      </div>
    </div>

    <div class="grid g-2" style="margin-bottom:16px;">
      <div class="card">
        <span class="card-tag">FIG.08</span>
        <h3>Winning Model</h3>
        <div class="sub">Naive (last non-zero) vs. Moving Average (3-month) — lower MAPE wins per part</div>
        <canvas id="chartModelSplit" height="230"></canvas>
      </div>
      <div class="card">
        <span class="card-tag">FIG.09</span>
        <h3>Model Selection by Demand Class</h3>
        <div class="sub">Which model wins within each demand pattern</div>
        <canvas id="chartModelByClass" height="230"></canvas>
      </div>
    </div>

    <div class="card">
      <span class="card-tag">FIG.10</span>
      <h3>Model Selection by Plant</h3>
      <div class="sub">Naive vs Moving Average split, per plant</div>
      <canvas id="chartModelByPlant" height="200"></canvas>
      <div class="insight"><span class="insight-icon">!</span> <span><b>Moving Average wins for ${pct(acc.best_model_counts['Moving_Average']||0, acc.eligible)}</b> of eligible parts, suggesting most demand has some short-term persistence rather than being purely spiky. Still, both candidate models are simple heuristics — no ARIMA/ETS/Prophet or ML model was benchmarked against them, which the BRD's "approved AI models" language implies should exist.</span></div>
    </div>
  `;

  new Chart(document.getElementById('chartModelSplit'), {
    type:'doughnut',
    data:{
      labels: modelKeys.map(k=>k==='Moving_Average'?'Moving Average':'Naive'),
      datasets:[{ data: modelKeys.map(k=>acc.best_model_counts[k]), backgroundColor:[COLORS.amber, '#3a4257'], borderColor:'#FFFFFF', borderWidth:2 }]
    },
    options:{ responsive:true, cutout:'60%', plugins:{ legend:{ position:'bottom', labels:{boxWidth:10,padding:14} } } }
  });

  const classes = Object.keys(acc.model_by_class);
  new Chart(document.getElementById('chartModelByClass'), {
    type:'bar',
    data:{
      labels: classes,
      datasets:[
        { label:'Naive', data: classes.map(c=>acc.model_by_class[c]['Naive']||0), backgroundColor:'#3a4257', borderRadius:4 },
        { label:'Moving Average', data: classes.map(c=>acc.model_by_class[c]['Moving_Average']||0), backgroundColor: COLORS.amber, borderRadius:4 }
      ]
    },
    options:{
      responsive:true,
      plugins:{ legend:{ position:'bottom', labels:{boxWidth:10,padding:14} } },
      scales:{ x:{ stacked:true, grid:{display:false} }, y:{ stacked:true, grid:{color:COLORS.line}, ticks:{callback:v=>fmt(v)} } }
    }
  });

  const plantsList = Object.keys(acc.model_by_plant).sort();
  new Chart(document.getElementById('chartModelByPlant'), {
    type:'bar',
    data:{
      labels: plantsList,
      datasets:[
        { label:'Naive', data: plantsList.map(p=>acc.model_by_plant[p]['Naive']||0), backgroundColor:'#3a4257', borderRadius:4, maxBarThickness:60 },
        { label:'Moving Average', data: plantsList.map(p=>acc.model_by_plant[p]['Moving_Average']||0), backgroundColor: COLORS.amber, borderRadius:4, maxBarThickness:60 }
      ]
    },
    options:{
      responsive:true,
      plugins:{ legend:{ position:'bottom', labels:{boxWidth:10,padding:14} } },
      scales:{ x:{ grid:{display:false} }, y:{ grid:{color:COLORS.line}, ticks:{callback:v=>fmt(v)} } }
    }
  });
}

/* ---------------- TAB SWITCHING ---------------- */
const tabs = document.querySelectorAll('.tab-btn');
const views = { executive: renderExecutive, planning: renderPlanning, accuracy: renderAccuracy };
let rendered = {};
tabs.forEach(t=>{
  t.addEventListener('click', ()=>{
    tabs.forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    const target = document.getElementById('view-'+t.dataset.view);
    target.classList.add('active');
    if(!rendered[t.dataset.view]){
      views[t.dataset.view]();
      rendered[t.dataset.view] = true;
    }
  });
});

// initial render
renderExecutive();
rendered.executive = true;

</script>
</body>
